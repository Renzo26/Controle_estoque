services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET:-produtos}
      APP_ENV: production
      APP_PORT: "8080"
      CORS_ORIGINS: ${CORS_ORIGINS}
    restart: unless-stopped
    networks:
      easypanel:
        aliases:
          - estoque_paraguay_backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./paraguay-wares
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      easypanel:
        aliases:
          - estoque_paraguay_frontend

networks:
  easypanel:
    external: true
